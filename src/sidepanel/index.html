<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beyond Markdown</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Beyond Markdown</h1>
    </header>

    <main>

      <section class="preview">
        <h2>Preview</h2>
        <div id="markdown-preview" class="preview-content">
          <p class="placeholder">Click "Generate" to preview markdown content...</p>
        </div>
      </section>

      <section class="actions">
        <button id="generate-btn" class="btn btn-primary">Generate</button>
        <button id="save-btn" class="btn btn-success" disabled>Save</button>
      </section>

      <section class="support">
        <a href="https://www.buymeacoffee.com/alvarocavalcanti" target="_blank" class="bmc-button">
          <span>☕</span> Buy me a coffee
        </a>
      </section>
    </main>
  </div>

  <script src="sidepanel.ts" type="module"></script>
</body>
</html>
