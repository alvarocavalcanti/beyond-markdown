name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build Chrome version
        run: npm run build

      - name: Build Firefox version
        run: npm run build:firefox

      - name: Verify Chrome build
        run: |
          if [ ! -f "dist/manifest.json" ]; then
            echo "Error: manifest.json not found in dist/"
            exit 1
          fi
          if [ ! -f "dist/popup/index.html" ]; then
            echo "Error: popup/index.html not found in dist/"
            exit 1
          fi
          echo "✓ Chrome build verified"

      - name: Verify Firefox build has correct manifest
        run: |
          if ! grep -q '"scripts"' dist/manifest.json; then
            echo "Error: Firefox manifest should have 'scripts' field"
            exit 1
          fi
          echo "✓ Firefox manifest verified"
