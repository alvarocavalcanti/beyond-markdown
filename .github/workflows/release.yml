name: Create Release

on:
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Read version from manifest
        id: version
        run: |
          VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('src/manifest.json')).version)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION"

      - name: Build Chrome release
        run: npm run release:chrome

      - name: Build Firefox release
        run: npm run release:firefox

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            beyond-markdown-chrome-v${{ steps.version.outputs.version }}.zip
            beyond-markdown-firefox-v${{ steps.version.outputs.version }}.zip
          body: |
            ## Beyond Markdown v${{ steps.version.outputs.version }}

            Browser extension to export D&D Beyond content as Markdown.

            ### Downloads

            - **Chrome**: `beyond-markdown-chrome-v${{ steps.version.outputs.version }}.zip`
            - **Firefox**: `beyond-markdown-firefox-v${{ steps.version.outputs.version }}.zip`

            ### Installation

            #### Chrome
            1. Download the Chrome zip file
            2. Extract the zip file
            3. Open Chrome and navigate to `chrome://extensions/`
            4. Enable "Developer mode"
            5. Click "Load unpacked" and select the extracted folder

            #### Firefox
            1. Download the Firefox zip file
            2. Extract the zip file
            3. Open Firefox and navigate to `about:debugging#/runtime/this-firefox`
            4. Click "Load Temporary Add-on..."
            5. Navigate to the extracted folder and select `manifest.json`

            ### Features

            - ✅ Extract D&D Beyond page content as Markdown
            - ✅ Custom rules for aside elements and tooltips
            - ✅ Clean markdown output
            - ✅ Works on all D&D Beyond source pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
